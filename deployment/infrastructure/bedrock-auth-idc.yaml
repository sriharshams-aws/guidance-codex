AWSTemplateFormatVersion: '2010-09-09'
Description: 'Codex with Bedrock - IAM Identity Center (IdC) Authentication Stack. Produces a Bedrock customer-managed policy and an IAM role trusted by sso.amazonaws.com with an AWSReservedSSO_* role-chaining condition, for use as the permission-boundary / role-chain target from an IdC Permission Set.'

Parameters:
  RoleName:
    Type: String
    Default: CodexBedrockIdCRole
    Description: Name for the chained IAM role assumed from an AWSReservedSSO_* session.
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-_]*$'
    MaxLength: 64

  PolicyName:
    Type: String
    Default: CodexBedrockInvokePolicy
    Description: Customer-managed policy scoped to bedrock:InvokeModel* on approved model ARNs.
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-_]*$'
    MaxLength: 128

  PermissionSetNamePattern:
    Type: String
    Default: 'CodexBedrockUser_*'
    Description: Glob pattern matching the IdC Permission Set role names allowed to chain into this role (matches AWSReservedSSO_<PermissionSetName>_<hash>).

  AllowedBedrockRegions:
    Type: CommaDelimitedList
    Default: 'us-east-1,us-west-2'
    Description: AWS regions where Bedrock InvokeModel is permitted.

  AllowedModelIdPattern:
    Type: String
    Default: '*'
    Description: Bedrock model ID glob (e.g. "openai.gpt-5-4*"). Default * allows all approved-access models.

  MaxSessionDurationSeconds:
    Type: Number
    Default: 28800
    MinValue: 3600
    MaxValue: 43200
    Description: Role max session duration in seconds. IdC default 28800 (8h); raise up to 43200 (12h) for long Codex runs.

  EnableMonitoring:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Grant cloudwatch:PutMetricData so the local OTel sidecar can publish Codex usage metrics to the CloudWatch native OTLP endpoint. Set false to omit monitoring permissions.

Conditions:
  MonitoringEnabled: !Equals [!Ref EnableMonitoring, 'true']

Resources:
  CodexBedrockInvokePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref PolicyName
      Description: Allow Codex clients to invoke approved Bedrock models (InvokeModel* and Mantle) in approved regions.
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: InvokeApprovedBedrockModels
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock:Converse
              - bedrock:ConverseStream
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/${AllowedModelIdPattern}'
              - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*'
              - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AllowedBedrockRegions
          - Sid: MantleInference
            Effect: Allow
            Action:
              # GPT-5.x via the Mantle OpenAI-compatible Responses endpoint
              # (bedrock-mantle.<region>.api.aws) requires BOTH the bearer-token
              # auth action and the inference action, verified against the live
              # API: CallWithBearerToken authenticates the request, then
              # CreateInference runs it against project/default.
              - bedrock-mantle:CallWithBearerToken
              - bedrock-mantle:CreateInference
              - bedrock-mantle:GetInference
            # NOTE: these calls do not populate aws:RequestedRegion, so a region
            # condition here causes an implicit deny. Region is instead bounded
            # by the regional Mantle endpoint the bearer token targets.
            Resource: '*'
          - Sid: ListBedrockResources
            Effect: Allow
            Action:
              - bedrock:ListFoundationModels
              - bedrock:ListInferenceProfiles
              - bedrock:GetFoundationModel
              - bedrock:GetInferenceProfile
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AllowedBedrockRegions
          # Local OTel sidecar publishes Codex usage metrics to the CloudWatch
          # native OTLP endpoint (monitoring.<region>.amazonaws.com) via SigV4
          # using these same session credentials. PutMetricData is the only
          # action native-OTLP metrics ingestion needs; scoped to approved
          # regions. Omitted entirely when EnableMonitoring=false.
          - !If
            - MonitoringEnabled
            - Sid: PublishCodexUsageMetrics
              Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
              Condition:
                StringEquals:
                  aws:RequestedRegion: !Ref AllowedBedrockRegions
            - !Ref 'AWS::NoValue'

  CodexBedrockIdCRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Chained role assumed from an IdC AWSReservedSSO_* session for Codex-on-Bedrock usage.
      MaxSessionDuration: !Ref MaxSessionDurationSeconds
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ChainFromIdCPermissionSet
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
            Condition:
              ArnLike:
                aws:PrincipalArn:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/AWSReservedSSO_${PermissionSetNamePattern}'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-reserved/sso.amazonaws.com/*/AWSReservedSSO_${PermissionSetNamePattern}'
      ManagedPolicyArns:
        - !Ref CodexBedrockInvokePolicy
      Tags:
        - Key: Purpose
          Value: Codex-on-Bedrock IdC chained role
        - Key: DeployedBy
          Value: bedrock-auth-idc.yaml

Outputs:
  RoleArn:
    Description: ARN of the chained Bedrock role. Reference from Codex config or as a role-chain target.
    Value: !GetAtt CodexBedrockIdCRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
  RoleName:
    Description: Name of the chained Bedrock role.
    Value: !Ref CodexBedrockIdCRole
  PolicyArn:
    Description: ARN of the Bedrock customer-managed policy. Attach directly to the IdC Permission Set if you prefer no role chaining.
    Value: !Ref CodexBedrockInvokePolicy
    Export:
      Name: !Sub '${AWS::StackName}-PolicyArn'
