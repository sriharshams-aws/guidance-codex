AWSTemplateFormatVersion: '2010-09-09'
Description: 'Codex monitoring dashboard with embedded custom widget Lambda functions'

Parameters:
  DashboardName:
    Type: String
    Default: CodexDashboard
    Description: Name for the CloudWatch dashboard

  MetricsLogGroup:
    Type: String
    Default: /aws/codex/metrics
    Description: CloudWatch Log Group containing Codex metrics

  MetricsRegion:
    Type: String
    Default: us-east-1
    Description: Region where metrics log group exists

  LambdaReservedConcurrentExecutions:
    Type: Number
    Default: 5
    MinValue: 1
    Description: Reserved concurrency limit for Lambda functions in this stack.

Resources:
  DashboardKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} dashboard data key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  DashboardKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-dashboard'
      TargetKeyId: !Ref DashboardKmsKey

  CustomWidgetPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} CloudWatch dashboard widget Lambda permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:StartQuery
              - logs:GetQueryResults
              - logs:StopQuery
              - logs:DescribeLogGroups
            Resource: '*'
          - Effect: Allow
            Action:
              - servicequotas:GetServiceQuota
              - servicequotas:ListServiceQuotas
            Resource: '*'
          - Effect: Allow
            Action:
              - cloudwatch:GetMetricStatistics
              - cloudwatch:GetMetricData
              - cloudwatch:ListMetrics
            Resource: '*'
          - Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:Scan
            Resource:
              - !GetAtt MetricsTable.Arn
              - !Sub '${MetricsTable.Arn}/index/*'
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt DashboardLambdaDLQ.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !GetAtt DashboardKmsKey.Arn

  MetricsAggregatorRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} metrics aggregator Lambda permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:StartQuery
              - logs:GetQueryResults
              - logs:StopQuery
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
            Resource: '*'
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: '*'
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:BatchWriteItem
              - dynamodb:UpdateItem
              - dynamodb:GetItem
            Resource:
              - !GetAtt MetricsTable.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt DashboardLambdaDLQ.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !GetAtt DashboardKmsKey.Arn

  # DynamoDB Table for Metrics Storage
  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CodexMetrics
      BillingMode: PAY_PER_REQUEST # On-demand scaling
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
        - AttributeName: gsi3pk
          AttributeType: S
        - AttributeName: gsi3sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserActivityIndex
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: MetricTypeIndex
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: MonthlyIndex
          KeySchema:
            - AttributeName: gsi3pk
              KeyType: HASH
            - AttributeName: gsi3sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DashboardKmsKey.Arn
      Tags:
        - Key: Name
          Value: CodexMetrics
        - Key: Purpose
          Value: Dashboard metrics storage

  QueryUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: Codex-QueryUtils
      Description: Shared utilities for rate limiting CloudWatch queries
      Content: ./lambda-functions/layer/
      CompatibleRuntimes:
        - python3.11
        - python3.12
      LicenseInfo: MIT

  MetricsUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: Codex-MetricsUtils
      Description: Shared utilities for querying CloudWatch Metrics
      Content: ./lambda-functions/layer/
      CompatibleRuntimes:
        - python3.11
        - python3.12
      LicenseInfo: MIT

  CustomWidgetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref CustomWidgetPolicy

  MetricsAggregatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref MetricsAggregatorRolePolicy

  DashboardLambdaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-lambda-dlq'
      KmsMasterKeyId: alias/aws/sqs
      MessageRetentionPeriod: 1209600

  MetricsAggregatorFunction:
    Type: AWS::Lambda::Function
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: This dashboard Lambda calls CloudWatch and DynamoDB public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      cfn_nag:
        rules_to_suppress:
          - id: W89
            reason: This dashboard Lambda calls CloudWatch and DynamoDB public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      guard:
        SuppressedRules:
          - LAMBDA_CONCURRENCY_CHECK: "ReservedConcurrentExecutions is set via CloudFormation parameter (type Number >=0); cfn-guard cannot resolve parameter Refs to integers at analysis time."
    Properties:
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrentExecutions
      FunctionName: Codex-MetricsAggregator
      Description: Aggregates Codex logs into CloudWatch Metrics
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt MetricsAggregatorRole.Arn
      Timeout: 120
      MemorySize: 512
      KmsKeyArn: !GetAtt DashboardKmsKey.Arn
      DeadLetterConfig:
        TargetArn: !GetAtt DashboardLambdaDLQ.Arn
      Environment:
        Variables:
          METRICS_LOG_GROUP: !Ref MetricsLogGroup
          METRICS_REGION: !Ref MetricsRegion
          METRICS_TABLE: !Ref MetricsTable
      Code: ./lambda-functions/metrics_aggregator/

  MetricsAggregatorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: Codex-MetricsAggregator-Schedule
      Description: Trigger metrics aggregation every 5 minutes
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt MetricsAggregatorFunction.Arn
          Id: MetricsAggregatorTarget
          RetryPolicy:
            MaximumRetryAttempts: 2

  MetricsAggregatorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsAggregatorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MetricsAggregatorScheduleRule.Arn

  TotalTokensWidget:
    Type: AWS::Lambda::Function
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: This dashboard Lambda calls CloudWatch public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      cfn_nag:
        rules_to_suppress:
          - id: W89
            reason: This dashboard Lambda calls CloudWatch public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      guard:
