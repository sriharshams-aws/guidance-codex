  #     Timeout: 60
  #     Layers:
  #       - !Ref QueryUtilsLayer
  #       - !Ref MetricsUtilsLayer
  #     Environment:
  #       Variables:
  #         METRICS_LOG_GROUP: !Ref MetricsLogGroup
  #         METRICS_REGION: !Ref MetricsRegion
  #         METRICS_ONLY: 'true'
  #         METRICS_TABLE: !Ref MetricsTable
  #     Code: ./lambda-functions/model_quota_usage/

  # CloudWatch Dashboard
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "custom",
              "x": 0,
              "y": 2,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${TotalTokensWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Total Tokens Used"
              }
            },
            {
              "type": "custom",
              "x": 6,
              "y": 2,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${ActiveUsersWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Active Users"
              }
            },
            {
              "type": "custom",
              "x": 12,
              "y": 2,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${OperationsCountWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Operations Count"
              }
            },
            {
              "type": "custom",
              "x": 18,
              "y": 2,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${CacheEfficiencyWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Cache Efficiency"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "Codex", "ActiveUsers", { "stat": "Sum" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Active Users Over Time",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "Codex", "LinesAdded", { "stat": "Sum", "label": "Lines Added" } ],
                  [ ".", "LinesRemoved", { "stat": "Sum", "label": "Lines Removed" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Lines Added/Removed Over Time",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                },
                "colors": [
                  "#10b981",
                  "#ef4444"
                ]
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/codex/metrics' | fields @timestamp, @message | filter @message like /codex.token.usage/ | parse @message /\"codex.token.usage\":(?<tokens>[0-9.]+)/ | stats sum(tokens) as total_tokens by bin(5m)",
                "region": "${MetricsRegion}",
                "title": "Token Usage Over Time",
                "queryLanguage": "cwli",
                "view": "timeSeries"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/codex/metrics' | filter @message like /codex.token.usage/ | parse @message /\"model\":\"(?<model>[^\"]*)\"/  | parse @message /\"codex.token.usage\":(?<tokens>[0-9.]+)/ | fields bin(5m) as time, if(model like /gpt-5-5/, tokens, 0) as gpt_5_5, if(model like /gpt-5-4/, tokens, 0) as gpt_5_4 | stats sum(gpt_5_5) as gpt_5_5, sum(gpt_5_4) as gpt_5_4 by time",
                "region": "${MetricsRegion}",
                "title": "Token Usage by Model Over Time",
                "queryLanguage": "cwli",
                "view": "timeSeries",
                "stacked": false
              }
            },
            {
              "type": "custom",
              "x": 0,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "endpoint": "${TopUsersWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Top Users by Token Usage"
              }
            },
            {
              "type": "custom",
              "x": 12,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "endpoint": "${TokenByModelWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Token Usage by Model"
              }
            },
            {
              "type": "custom",
              "x": 0,
              "y": 24,
              "width": 8,
              "height": 6,
              "properties": {
                "endpoint": "${CodeGenerationByLanguageWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Code Generation by Language"
              }
            },
            {
              "type": "custom",
              "x": 8,
              "y": 24,
              "width": 8,
              "height": 6,
              "properties": {
                "endpoint": "${TokenUsageByTypeWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Token Usage by Type"
              }
            },
            {
              "type": "custom",
              "x": 16,
              "y": 24,
              "width": 8,
              "height": 6,
              "properties": {
                "endpoint": "${OperationsByTypeWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Operations by Type"
              }
            },
            {
              "type": "text",
              "x": 0,
              "y": 30,
              "width": 24,
              "height": 2,
              "properties": {
                "markdown": "## Developer Productivity Metrics",
                "background": "transparent"
              }
            },
            {
              "type": "custom",
              "x": 0,
              "y": 32,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${LinesOfCodeWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Lines of Code"
              }
            },
            {
              "type": "custom",
              "x": 6,
              "y": 32,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${CommitsWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Commits"
              }
            },
            {
              "type": "custom",
              "x": 12,
              "y": 32,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${CodeAcceptanceWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Code Acceptance"
              }
            },
            {
              "type": "custom",
              "x": 18,
              "y": 32,
              "width": 6,
              "height": 4,
              "properties": {
                "endpoint": "${ActiveHoursWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Active Hours"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 36,
              "width": 12,
              "height": 4,
              "properties": {
                "metrics": [
                  [ "AWS/Bedrock", "InvocationThrottles", { "stat": "Sum", "label": "Throttles (us-east-1)", "region": "us-east-1" } ],
                  [ "AWS/Bedrock", "InvocationThrottles", { "stat": "Sum", "label": "Throttles (us-west-2)", "region": "us-west-2" } ],
                  [ "AWS/Bedrock", "InvocationThrottles", { "stat": "Sum", "label": "Throttles (us-east-2)", "region": "us-east-2" } ],
                  [ "AWS/Bedrock", "InvocationClientErrors", { "stat": "Sum", "label": "Client Errors (us-east-1)", "region": "us-east-1" } ],
                  [ "AWS/Bedrock", "InvocationClientErrors", { "stat": "Sum", "label": "Client Errors (us-west-2)", "region": "us-west-2" } ],
                  [ "AWS/Bedrock", "InvocationClientErrors", { "stat": "Sum", "label": "Client Errors (us-east-2)", "region": "us-east-2" } ],
                  [ "AWS/Bedrock", "InvocationServerErrors", { "stat": "Sum", "label": "Server Errors (us-east-1)", "region": "us-east-1" } ],
                  [ "AWS/Bedrock", "InvocationServerErrors", { "stat": "Sum", "label": "Server Errors (us-west-2)", "region": "us-west-2" } ],
                  [ "AWS/Bedrock", "InvocationServerErrors", { "stat": "Sum", "label": "Server Errors (us-east-2)", "region": "us-east-2" } ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "us-east-1",
                "title": "Bedrock API Errors",
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                },
                "view": "timeSeries",
                "stacked": false
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 36,
              "width": 12,
              "height": 4,
              "properties": {
                "metrics": [
                  [ "AWS/Bedrock", "InvocationThrottles", "ModelId", "openai.gpt-5-5", { "stat": "Sum", "label": "GPT-5.5 (us-east-1)", "region": "us-east-1" } ],
                  [ "AWS/Bedrock", "InvocationThrottles", "ModelId", "openai.gpt-5-5", { "stat": "Sum", "label": "GPT-5.5 (us-east-2)", "region": "us-east-2" } ],
                  [ "AWS/Bedrock", "InvocationThrottles", "ModelId", "openai.gpt-5-4", { "stat": "Sum", "label": "GPT-5.4 (us-east-1)", "region": "us-east-1" } ],
                  [ "AWS/Bedrock", "InvocationThrottles", "ModelId", "openai.gpt-5-4", { "stat": "Sum", "label": "GPT-5.4 (us-west-2)", "region": "us-west-2" } ],
                  [ "AWS/Bedrock", "InvocationThrottles", "ModelId", "openai.gpt-5-4", { "stat": "Sum", "label": "GPT-5.4 (us-east-2)", "region": "us-east-2" } ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "us-east-1",
                "title": "Throttles by Model",
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                },
                "view": "timeSeries",
                "stacked": false
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: Direct URL to the CloudWatch dashboard
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'

  LogsInsightsURL:
    Description: URL to CloudWatch Logs Insights
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:logs-insights'

  MetricsTableArn:
    Description: ARN of the CodexMetrics DynamoDB table
    Value: !GetAtt MetricsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MetricsTableArn'

  MetricsAggregatorRoleName:
    Description: Name of the MetricsAggregatorRole for cross-stack permissions
    Value: !Ref MetricsAggregatorRole
    Export:
      Name: !Sub '${AWS::StackName}-MetricsAggregatorRoleName'
