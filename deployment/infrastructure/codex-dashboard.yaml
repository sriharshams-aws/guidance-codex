    Properties:
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrentExecutions
      FunctionName: Codex-Widget-TotalTokens
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt CustomWidgetRole.Arn
      Timeout: 60
      KmsKeyArn: !GetAtt DashboardKmsKey.Arn
      DeadLetterConfig:
        TargetArn: !GetAtt DashboardLambdaDLQ.Arn
      Layers:
        - !Ref QueryUtilsLayer
        - !Ref MetricsUtilsLayer
      Environment:
        Variables:
          METRICS_LOG_GROUP: !Ref MetricsLogGroup
          METRICS_REGION: !Ref MetricsRegion
          METRICS_ONLY: 'true'
      Code: ./lambda-functions/total_tokens/

