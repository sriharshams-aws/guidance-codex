AWSTemplateFormatVersion: '2010-09-09'
Description: '( SO9610 )  Cognito User Pool setup for Codex authentication - supports external OIDC providers like Amazon Federate/Midway'

Parameters:
  UserPoolName:
    Type: String
    Default: codex-auth
    Description: Name for the Cognito User Pool
    AllowedPattern: '^[\w\s+=,.@-]+$'
    ConstraintDescription: Must be a valid Cognito User Pool name

  DomainPrefix:
    Type: String
    Description: Prefix for Cognito domain (must be globally unique, e.g., 'myteam-codex')
    AllowedPattern: '^[a-z0-9](?:[a-z0-9\-]{0,61}[a-z0-9])?$'
    ConstraintDescription: Must be a valid domain prefix (lowercase letters, numbers, hyphens)

  CallbackURLs:
    Type: CommaDelimitedList
    Default: 'http://localhost:8400/callback'
    Description: Comma-delimited list of allowed callback URLs for OAuth2 flow

  LogoutURLs:
    Type: CommaDelimitedList
    Default: 'http://localhost:8400/logout'
    Description: Comma-delimited list of allowed logout URLs (optional)

  FederateEnvironment:
    Type: String
    Default: 'none'
    AllowedValues:
      - 'none'
      - 'integ'
      - 'prod'
    Description: Amazon Federate environment to use (for Amazon internal use only)

  FederateClientId:
    Type: String
    Default: ''
    Description: Client ID from Federate service profile (required if using Federate)
    NoEcho: true

  FederateClientSecret:
    Type: String
    Default: ''
    Description: Client secret from Federate service profile (required if using Federate)
    NoEcho: true

  LambdaReservedConcurrentExecutions:
    Type: Number
    Default: 5
    MinValue: 1
    Description: Reserved concurrency limit for Lambda functions in this stack.

Conditions:
  UseFederate: !Not [!Equals [!Ref FederateEnvironment, 'none']]
  NotUseFederate: !Equals [!Ref FederateEnvironment, 'none']
  UseFederateInteg: !Equals [!Ref FederateEnvironment, 'integ']

Resources:
  CognitoSetupKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} Cognito setup Lambda and secrets key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  CognitoSetupKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-cognito-setup'
      TargetKeyId: !Ref CognitoSetupKmsKey

  CognitoSetupLambdaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-cognito-setup-lambda-dlq'
      KmsMasterKeyId: alias/aws/sqs
      MessageRetentionPeriod: 1209600

  # Cognito User Pool with settings matching Amazon Federate requirements
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      # Sign-in options: Use AliasAttributes for federated auth (cannot use both UsernameAttributes and AliasAttributes)
      AliasAttributes:
        - preferred_username
        - email
      # Required attributes for sign-up
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: preferred_username
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: given_name
          AttributeDataType: String
          Required: false
          Mutable: true
        - Name: family_name
          AttributeDataType: String
          Required: false
          Mutable: true
      # Message configuration - don't automatically send messages
      AutoVerifiedAttributes: []
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      # Disable self-registration as required
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      # MFA optional for flexibility
      MfaConfiguration: 'OPTIONAL'
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      # User pool tags
      UserPoolTags:
        Name: !Ref UserPoolName
        Purpose: 'Codex Authentication'
        FederateIntegration: !If [UseFederate, 'true', 'false']

  # App Client with specific token validity settings
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${UserPoolName}-client'
      UserPoolId: !Ref UserPool
      # Public client for CLI apps (no client secret, uses PKCE)
      GenerateSecret: false
      # OAuth2 configuration
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref LogoutURLs
      # Authentication flows
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      # Token validity as specified in the guide
      AuthSessionValidity: 3         # 3 minutes
      RefreshTokenValidity: 600      # 600 minutes (10 hours)
      AccessTokenValidity: 10        # 10 minutes
      IdTokenValidity: 60           # 60 minutes
      TokenValidityUnits:
        RefreshToken: minutes
        AccessToken: minutes
        IdToken: minutes
      # Security settings as specified
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      # Identity providers - updated based on Federate usage
      SupportedIdentityProviders:
        - !If [UseFederate, !Ref ExternalIdentityProvider, COGNITO]
        - COGNITO
      # Attributes
      ReadAttributes:
        - email
        - email_verified
        - preferred_username
        - given_name
        - family_name
        - sub
      WriteAttributes:
        - email
        - preferred_username
        - given_name
        - family_name

  # Distribution Web Client (for authenticated landing page)
  # This is a confidential client with client secret for ALB OIDC authentication
  DistributionWebClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${UserPoolName}-distribution-web'
      UserPoolId: !Ref UserPool
      # OAuth2 configuration for web application
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      # Placeholder callback URLs - will be updated after ALB deployment
      CallbackURLs:
        - 'https://placeholder.example.com/oauth2/idpresponse'
      LogoutURLs:
        - 'https://placeholder.example.com'
      # Authentication flows
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      # Token validity settings
      AuthSessionValidity: 3         # 3 minutes
      RefreshTokenValidity: 600      # 600 minutes (10 hours)
      AccessTokenValidity: 10        # 10 minutes
      IdTokenValidity: 60           # 60 minutes
      TokenValidityUnits:
        RefreshToken: minutes
        AccessToken: minutes
        IdToken: minutes
      # Security settings
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      # Identity providers - same as main client
      SupportedIdentityProviders:
        - !If [UseFederate, !Ref ExternalIdentityProvider, COGNITO]
        - COGNITO
      # Generate client secret (KEY DIFFERENCE from CLI client)
      GenerateSecret: true
      # Attributes
      ReadAttributes:
        - email
        - email_verified
        - preferred_username
        - given_name
        - family_name
        - sub
      WriteAttributes:
        - email
        - preferred_username
        - given_name
        - family_name

  # Cognito Domain
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  # External Identity Provider (Federate/Midway)
  ExternalIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: UseFederate
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: midway
      ProviderType: OIDC
      ProviderDetails:
        client_id: !Ref FederateClientId
        client_secret: !Ref FederateClientSecret
        authorize_scopes: 'openid'
        attributes_request_method: GET
        oidc_issuer: !If
          - UseFederateInteg
          - 'https://idp-integ.federate.amazon.com'
          - 'https://idp.federate.amazon.com'
      AttributeMapping:
        preferred_username: sub
        email: EMAIL
        given_name: GIVEN_NAME
        family_name: FAMILY_NAME

  # Update client to use external provider after it's created
  ClientUpdate:
    Type: AWS::CloudFormation::CustomResource
    Condition: UseFederate
    DependsOn: ExternalIdentityProvider
    Properties:
      ServiceToken: !GetAtt UpdateClientFunction.Arn
      UserPoolId: !Ref UserPool
      ClientId: !Ref UserPoolClient
      ProviderName: midway

  # Lambda function to update client with external provider
  UpdateClientFunction:
    Type: AWS::Lambda::Function
    Condition: UseFederate
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: This custom-resource Lambda calls Cognito public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      cfn_nag:
        rules_to_suppress:
          - id: W89
            reason: This custom-resource Lambda calls Cognito public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      guard:
        SuppressedRules:
          - LAMBDA_CONCURRENCY_CHECK: "ReservedConcurrentExecutions is set via CloudFormation parameter (type Number >=0); cfn-guard cannot resolve parameter Refs to integers at analysis time."
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt UpdateClientRole.Arn
      Timeout: 60
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrentExecutions
      KmsKeyArn: !GetAtt CognitoSetupKmsKey.Arn
      DeadLetterConfig:
        TargetArn: !GetAtt CognitoSetupLambdaDLQ.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  user_pool_id = event['ResourceProperties']['UserPoolId']
                  client_id = event['ResourceProperties']['ClientId']
                  provider_name = event['ResourceProperties']['ProviderName']

                  cognito = boto3.client('cognito-idp')

                  # Get current client config
                  response = cognito.describe_user_pool_client(
                      UserPoolId=user_pool_id,
                      ClientId=client_id
                  )

                  client = response['UserPoolClient']

                  # Update supported identity providers
                  providers = client.get('SupportedIdentityProviders', ['COGNITO'])
                  if provider_name not in providers:
                      providers.append(provider_name)

                  # Update client
                  update_params = {
                      'UserPoolId': user_pool_id,
                      'ClientId': client_id,
                      'SupportedIdentityProviders': providers
                  }

                  # Copy over existing settings
                  for key in ['ClientName', 'RefreshTokenValidity', 'AccessTokenValidity',
                              'IdTokenValidity', 'TokenValidityUnits', 'ReadAttributes',
                              'WriteAttributes', 'ExplicitAuthFlows', 'AllowedOAuthFlows',
                              'AllowedOAuthScopes', 'CallbackURLs', 'LogoutURLs',
                              'AllowedOAuthFlowsUserPoolClient', 'PreventUserExistenceErrors',
                              'EnableTokenRevocation', 'AuthSessionValidity']:
                      if key in client:
                          update_params[key] = client[key]

                  cognito.update_user_pool_client(**update_params)

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'Message': 'Client updated successfully'
                  })
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Message': str(e)
                  })

  UpdateClientRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: UseFederate
    Properties:
      Description: !Sub "${AWS::StackName} Cognito client update Lambda permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - cognito-idp:DescribeUserPoolClient
              - cognito-idp:UpdateUserPoolClient
            Resource:
              - !GetAtt UserPool.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt CognitoSetupLambdaDLQ.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !GetAtt CognitoSetupKmsKey.Arn

  # IAM role for Lambda
  UpdateClientRole:
    Type: AWS::IAM::Role
    Condition: UseFederate
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref UpdateClientRolePolicy

  # Lambda function to retrieve DistributionWebClient secret and store in Secrets Manager
  SecretStoreFunction:
    Type: AWS::Lambda::Function
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: This custom-resource Lambda calls Cognito and Secrets Manager public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      cfn_nag:
        rules_to_suppress:
          - id: W89
            reason: This custom-resource Lambda calls Cognito and Secrets Manager public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      guard:
        SuppressedRules:
          - LAMBDA_CONCURRENCY_CHECK: "ReservedConcurrentExecutions is set via CloudFormation parameter (type Number >=0); cfn-guard cannot resolve parameter Refs to integers at analysis time."
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SecretStoreRole.Arn
      Timeout: 60
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrentExecutions
      KmsKeyArn: !GetAtt CognitoSetupKmsKey.Arn
      DeadLetterConfig:
        TargetArn: !GetAtt CognitoSetupLambdaDLQ.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      # On stack deletion, optionally keep the secret for safety
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  user_pool_id = event['ResourceProperties']['UserPoolId']
                  client_id = event['ResourceProperties']['ClientId']
                  secret_name = event['ResourceProperties']['SecretName']
                  kms_key_id = event['ResourceProperties']['KmsKeyId']

                  cognito = boto3.client('cognito-idp')
                  secrets = boto3.client('secretsmanager')

                  # Get the client secret from Cognito
                  response = cognito.describe_user_pool_client(
                      UserPoolId=user_pool_id,
                      ClientId=client_id
                  )

                  client_secret = response['UserPoolClient'].get('ClientSecret')
                  if not client_secret:
                      raise ValueError("Client does not have a secret (GenerateSecret must be true)")

                  # Store in Secrets Manager
                  try:
                      secret_response = secrets.create_secret(
                          Name=secret_name,
                          SecretString=client_secret,
                          KmsKeyId=kms_key_id,
                          Description=f"Auto-generated secret for Cognito distribution web client {client_id}"
                      )
                      secret_arn = secret_response['ARN']
                  except secrets.exceptions.ResourceExistsException:
                      # Secret exists, update it instead
                      secret_response = secrets.update_secret(
                          SecretId=secret_name,
                          SecretString=client_secret,
                          KmsKeyId=kms_key_id
                      )
                      # Get ARN for existing secret
                      describe_response = secrets.describe_secret(SecretId=secret_name)
                      secret_arn = describe_response['ARN']

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'SecretArn': secret_arn,
                      'SecretName': secret_name
                  })

              except Exception as e:
                  print(f"Error storing client secret: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Message': str(e)
                  })

  SecretStoreRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} Cognito secret store Lambda permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - cognito-idp:DescribeUserPoolClient
            Resource:
              - !GetAtt UserPool.Arn
          - Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:UpdateSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:TagResource
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*'
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !GetAtt CognitoSetupKmsKey.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt CognitoSetupLambdaDLQ.Arn

  # IAM role for SecretStoreFunction
  SecretStoreRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref SecretStoreRolePolicy

  # Custom Resource to automatically store distribution web client secret
  DistributionWebClientSecret:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt SecretStoreFunction.Arn
      UserPoolId: !Ref UserPool
      ClientId: !Ref DistributionWebClient
      SecretName: !Sub '${AWS::StackName}-distribution-web-client-secret'
      KmsKeyId: !Ref CognitoSetupKmsKey

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool App Client ID (CLI native app - no secret)
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-ClientId'

  DistributionWebClientId:
    Description: Cognito Web App Client ID (for distribution landing page - has secret)
    Value: !Ref DistributionWebClient
    Export:
      Name: !Sub '${AWS::StackName}-DistributionWebClientId'

  DistributionWebClientSecretArn:
    Description: Secrets Manager ARN for distribution web client secret (auto-stored by CloudFormation)
    Value: !GetAtt DistributionWebClientSecret.SecretArn
    Export:
      Name: !Sub '${AWS::StackName}-DistributionWebClientSecretArn'

  UserPoolDomain:
    Description: Cognito User Pool Domain
    Value: !Sub '${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub '${AWS::StackName}-Domain'

  IdpResponseEndpoint:
    Description: IDP response endpoint for Federate configuration
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/idpresponse'

  CodexConfiguration:
    Description: Configuration values for Codex CLI authentication
    Value: !Sub |
      Codex CLI authentication (native app) — use these values in the
      [auth] section of your Codex config (see
      https://developers.openai.com/codex/config-advanced):

      - Provider Domain: ${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com
      - User Pool ID:    ${UserPool}
      - Client ID:       ${UserPoolClient}
      - Issuer URL:      https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
      - Authorize URL:   https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/authorize
      - Token URL:       https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/token

  DistributionWebClientConfiguration:
    Description: Configuration for distribution landing page (web app)
    Value: !Sub |
      Distribution landing page with Cognito web authentication.

      Detected configuration from this stack:
        User Pool ID: ${UserPool}
        Domain:       ${DomainPrefix}
        Client ID:    ${DistributionWebClient}
        Secret ARN:   (stored in Secrets Manager — see DistributionWebClientSecretArn output)

      1) Deploy the landing page stack with the values above:

         aws cloudformation deploy \
           --template-file deployment/infrastructure/landing-page-distribution.yaml \
           --stack-name codex-landing-page \
           --capabilities CAPABILITY_IAM \
           --parameter-overrides \
               IdPProvider=Cognito \
               CognitoUserPoolId=${UserPool} \
               CognitoUserPoolDomain=${DomainPrefix} \
               CognitoClientId=${DistributionWebClient} \
               CognitoClientSecretArn=$(aws cloudformation describe-stacks \
                   --stack-name ${AWS::StackName} \
                   --query "Stacks[0].Outputs[?OutputKey=='DistributionWebClientSecretArn'].OutputValue" \
                   --output text)

      2) Read the ALB DNS from the landing-page stack outputs:

         aws cloudformation describe-stacks \
           --stack-name codex-landing-page \
           --query "Stacks[0].Outputs[?OutputKey=='DistributionURL'].OutputValue" \
           --output text

      3) Update the callback / logout URLs to match the ALB DNS:

         aws cognito-idp update-user-pool-client \
           --user-pool-id ${UserPool} \
           --client-id ${DistributionWebClient} \
           --callback-urls "https://<alb-dns-from-stack-output>/oauth2/idpresponse" \
           --logout-urls "https://<alb-dns-from-stack-output>"

      Note: the client secret is auto-stored in Secrets Manager by this
      stack; the landing-page template reads it via the secret ARN above.

  FederateSetupInstructions:
    Condition: UseFederate
    Description: Federate has been configured
    Value: !Sub
      - |
        Federate integration has been configured with:
        - Environment: ${FederateEnvironment}
        - Provider Name: midway
        - Issuer: ${IssuerUrl}

        The redirect URI for Federate is:
        https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/idpresponse

        To complete setup:
        1. Ensure your Federate service profile includes this redirect URI
        2. Verify the client ID and secret match your Federate configuration
        3. Add allowed/restricted groups in Federate for access control
      - IssuerUrl: !If
          - UseFederateInteg
          - 'https://idp-integ.federate.amazon.com'
          - 'https://idp.federate.amazon.com'

  ManualFederateSetup:
    Condition: NotUseFederate
    Description: Instructions for manual Federate setup
    Value: !Sub |
      To add Amazon Federate/Midway authentication:

      1. Create a Federate service profile at:
         - Integ: https://integ.ep.federate.a2z.com/
         - Prod: https://prod.ep.federate.a2z.com/

      2. Configure the service profile:
         - Service Name: Your service name
         - Protocol: OIDC
         - Client ID: Create a unique identifier
         - Redirect URI: https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/idpresponse
         - Claims: EMAIL, GIVEN_NAME, FAMILY_NAME
         - Groups: Configure allowed LDAP/ANT/POSIX groups

      3. In Cognito Console:
         - Go to User Pool > Sign-in experience > Identity providers
         - Add identity provider > OpenID Connect
         - Provider name: midway
         - Client ID: (from Federate)
         - Client secret: (from Federate)
         - Issuer URL: https://idp.federate.amazon.com (or idp-integ for testing)
         - Scopes: openid
         - Attribute mapping:
           * sub → preferred_username
           * EMAIL → email
           * GIVEN_NAME → given_name
           * FAMILY_NAME → family_name

      4. Update app client to include 'midway' in supported identity providers
