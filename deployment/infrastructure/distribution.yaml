AWSTemplateFormatVersion: '2010-09-09'
Description: 'Distribution infra - S3 bucket and IAM for package distribution'

Parameters:
  IdentityPoolName:
    Type: String
    Default: codex
    Description: Name prefix for resources (from identity pool name)

Resources:
  DistributionSecretsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} distribution secrets key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  DistributionSecretsKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-distribution-secrets'
      TargetKeyId: !Ref DistributionSecretsKmsKey

  # S3 Bucket for access logs
  LoggingBucket:
    Type: AWS::S3::Bucket
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: This bucket is the distribution access-log destination; recursive server access logging is intentionally not enabled.
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: This bucket is the distribution access-log destination; recursive server access logging is intentionally not enabled.
    Properties:
      BucketName: !Sub '${IdentityPoolName}-distribution-logs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: 1
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Application
          Value: CodexWithBedrock
        - Key: Purpose
          Value: DistributionAccessLogs

  # S3 Bucket for package distribution
  DistributionBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${IdentityPoolName}-distribution-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: 1
      AccessControl: Private
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: package-downloads/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldPackages
            Status: Enabled
            Prefix: packages/
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 7
          - Id: DeleteOldWindowsBuilds
            Status: Enabled
            Prefix: windows-builds/
            ExpirationInDays: 7
            NoncurrentVersionExpirationInDays: 1
      Tags:
        - Key: Application
          Value: CodexWithBedrock
        - Key: Purpose
          Value: PackageDistribution

  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt LoggingBucket.Arn
              - !Sub '${LoggingBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  DistributionBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DistributionBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt DistributionBucket.Arn
              - !Sub '${DistributionBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  # IAM Group for distribution users
  DistributionGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub '${IdentityPoolName}-distributors'

  # IAM User for distribution (presigned URLs)
  DistributionUser:
    Type: AWS::IAM::User
    Metadata:
      guard:
        SuppressedRules:
          - IAM_USER_LOGIN_PROFILE_USES_SECURE_PARAMETER: "This IAM user is programmatic-only (no console login); LoginProfile is intentionally absent."
    Properties:
      UserName: !Sub '${IdentityPoolName}-distributor'
      Groups:
        - !Ref DistributionGroup

  # Access key for distribution user
  DistributionUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref DistributionUser

  # Policy for distribution group - only read access to packages
  DistributionGroupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DistributionGroupS3ReadPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
            Resource: !Sub '${DistributionBucket.Arn}/packages/*'
      Groups:
        - !Ref DistributionGroup

  # Secret to store distribution user credentials
  DistributionUserSecret:
    Type: AWS::SecretsManager::Secret
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_149
            comment: Secret stores IAM access key credentials; automated rotation requires a custom Lambda not included in this stack.
      cfn_nag:
        rules_to_suppress:
          - id: W77
            reason: Secret stores IAM access key credentials; automated rotation requires a custom Lambda not included in this stack.
      guard:
        SuppressedRules:
          - SECRETSMANAGER_ROTATION_ENABLED_CHECK: "Secret stores IAM access key credentials; automated rotation requires a custom Lambda not included in this stack."
    Properties:
      Name: !Sub '${IdentityPoolName}-distributor-credentials'
      Description: IAM credentials for generating long-lived presigned URLs
      KmsKeyId: !Ref DistributionSecretsKmsKey
      SecretString: !Sub |
        {
          "AccessKeyId": "${DistributionUserAccessKey}",
          "SecretAccessKey": "${DistributionUserAccessKey.SecretAccessKey}"
        }
      Tags:
        - Key: Application
          Value: CodexWithBedrock
        - Key: Purpose
          Value: DistributionCredentials

Outputs:
  DistributionBucket:
    Description: S3 bucket for package distribution
    Value: !Ref DistributionBucket
    Export:
      Name: !Sub '${AWS::StackName}-DistributionBucket'

  DistributionBucketArn:
    Description: ARN of the distribution bucket
    Value: !GetAtt DistributionBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DistributionBucketArn'

  DistributionSecretArn:
    Description: ARN of the Secrets Manager secret containing distribution credentials
    Value: !Ref DistributionUserSecret
    Export:
      Name: !Sub '${AWS::StackName}-DistributionSecretArn'

  DistributionSecretName:
    Description: Name of the Secrets Manager secret containing distribution credentials
    Value: !Sub '${IdentityPoolName}-distributor-credentials'
    Export:
      Name: !Sub '${AWS::StackName}-DistributionSecretName'

  LoggingBucket:
    Description: S3 bucket for access logs
    Value: !Ref LoggingBucket
    Export:
      Name: !Sub '${AWS::StackName}-LoggingBucket'
