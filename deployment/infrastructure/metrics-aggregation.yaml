# ABOUTME: CloudFormation template for metrics aggregation Lambda and EventBridge
# ABOUTME: Aggregates Codex logs into CloudWatch Metrics every 5 minutes

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Codex Metrics Aggregation Pipeline'

Parameters:
  MetricsLogGroup:
    Type: String
    Description: CloudWatch Logs group to aggregate metrics from
    Default: /aws/lambda/bedrock-codex-logs

  MetricsRegion:
    Type: String
    Description: Region where metrics log group exists
    Default: us-east-1

  AggregationInterval:
    Type: Number
    Description: Aggregation interval in minutes
    Default: 5
    MinValue: 1
    MaxValue: 60

  LambdaReservedConcurrentExecutions:
    Type: Number
    Default: 5
    MinValue: 1
    Description: Reserved concurrency limit for Lambda functions in this stack.

  AlarmSNSTopicArn:
    Type: String
    Default: ''
    Description: Optional SNS topic ARN for CloudWatch alarm notifications. Leave empty to skip alarm actions.

Conditions:
  HasAlarmSNS: !Not [!Equals [!Ref AlarmSNSTopicArn, '']]

Resources:
  MetricsAggregationKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} metrics aggregation logs key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.${AWS::URLSuffix}'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: '*'
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'

  MetricsAggregationKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-metrics-aggregation'
      TargetKeyId: !Ref MetricsAggregationKmsKey

  MetricsAggregatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref MetricsAggregatorPolicy

  MetricsAggregatorPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} metrics aggregator Lambda permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:StartQuery
              - logs:GetQueryResults
              - logs:StopQuery
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
            Resource: '*'
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: '*'
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt MetricsAggregatorDLQ.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !GetAtt MetricsAggregationKmsKey.Arn

  MetricsAggregatorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-metrics-aggregator-dlq'
      KmsMasterKeyId: alias/aws/sqs
      MessageRetentionPeriod: 1209600

  MetricsAggregatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/codex-metrics-aggregator
      KmsKeyId: !GetAtt MetricsAggregationKmsKey.Arn
      RetentionInDays: 7

  MetricsAggregatorFunction:
    Type: AWS::Lambda::Function
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_117
            comment: This aggregation Lambda calls CloudWatch public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      cfn_nag:
        rules_to_suppress:
          - id: W89
            reason: This aggregation Lambda calls CloudWatch public service APIs; VPC placement would require NAT or interface endpoints and is left to deployment architecture.
      guard:
        SuppressedRules:
          - LAMBDA_CONCURRENCY_CHECK: "ReservedConcurrentExecutions is set via CloudFormation parameter (type Number >=0); cfn-guard cannot resolve parameter Refs to integers at analysis time."
    Properties:
      FunctionName: codex-metrics-aggregator
      Description: Aggregates Codex logs into CloudWatch Metrics
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt MetricsAggregatorRole.Arn
      Timeout: 120
      MemorySize: 512
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrentExecutions
      KmsKeyArn: !GetAtt MetricsAggregationKmsKey.Arn
      DeadLetterConfig:
        TargetArn: !GetAtt MetricsAggregatorDLQ.Arn
      Environment:
        Variables:
          METRICS_LOG_GROUP: !Ref MetricsLogGroup
          METRICS_REGION: !Ref MetricsRegion
      Code:
        ZipFile: |
          # Placeholder code - will be replaced by actual implementation
          import json
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': json.dumps('Placeholder')}

  MetricsAggregatorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: codex-metrics-aggregator-schedule
      Description: !Sub 'Trigger metrics aggregation every ${AggregationInterval} minutes'
      ScheduleExpression: !Sub 'rate(${AggregationInterval} minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt MetricsAggregatorFunction.Arn
          Id: MetricsAggregatorTarget
          RetryPolicy:
            MaximumRetryAttempts: 2
            MaximumEventAgeInSeconds: 600

  MetricsAggregatorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsAggregatorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MetricsAggregatorScheduleRule.Arn

  # CloudWatch Alarms for monitoring the aggregator
  MetricsAggregatorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when metrics aggregator Lambda fails
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref MetricsAggregatorFunction
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmSNS, !Ref AlarmSNSTopicArn, !Ref AWS::NoValue]
      OKActions:
        - !If [HasAlarmSNS, !Ref AlarmSNSTopicArn, !Ref AWS::NoValue]
      InsufficientDataActions:
        - !If [HasAlarmSNS, !Ref AlarmSNSTopicArn, !Ref AWS::NoValue]

  MetricsAggregatorDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when metrics aggregator takes too long
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 60000  # 60 seconds
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref MetricsAggregatorFunction
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmSNS, !Ref AlarmSNSTopicArn, !Ref AWS::NoValue]
      OKActions:
        - !If [HasAlarmSNS, !Ref AlarmSNSTopicArn, !Ref AWS::NoValue]
      InsufficientDataActions:
        - !If [HasAlarmSNS, !Ref AlarmSNSTopicArn, !Ref AWS::NoValue]

  # Custom metrics dashboard for monitoring aggregation health
  MetricsAggregationDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: codex-metrics-aggregation-health
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Invocations", {"stat": "Sum", "label": "Invocations"}],
                  [".", "Errors", {"stat": "Sum", "label": "Errors"}],
                  [".", "Duration", {"stat": "Average", "label": "Avg Duration (ms)"}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Metrics Aggregator Performance",
                "period": 300,
                "dimensions": {
                  "FunctionName": "${MetricsAggregatorFunction}"
                }
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["Codex", "TotalTokens", {"stat": "Sum"}],
                  [".", "ActiveUsers", {"stat": "Maximum"}],
                  [".", "CacheEfficiency", {"stat": "Average"}]
                ],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "title": "Aggregated Metrics Overview",
                "period": 300
              }
            }
          ]
        }

Outputs:
  MetricsAggregatorFunctionArn:
    Description: ARN of the Metrics Aggregator Lambda function
    Value: !GetAtt MetricsAggregatorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MetricsAggregatorArn'

  MetricsAggregatorFunctionName:
    Description: Name of the Metrics Aggregator Lambda function
    Value: !Ref MetricsAggregatorFunction
    Export:
      Name: !Sub '${AWS::StackName}-MetricsAggregatorName'

  MetricsNamespace:
    Description: CloudWatch Metrics namespace for aggregated metrics
    Value: Codex
    Export:
      Name: !Sub '${AWS::StackName}-MetricsNamespace'

  AggregationScheduleArn:
    Description: ARN of the EventBridge rule for aggregation schedule
    Value: !GetAtt MetricsAggregatorScheduleRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ScheduleArn'
