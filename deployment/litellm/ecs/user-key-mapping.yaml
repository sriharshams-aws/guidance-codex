AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB table for JWT middleware user-to-key mapping

Parameters:
  TableName:
    Type: String
    Default: codex-user-keys
    Description: Name of the DynamoDB table for user API key mappings

Resources:
  UserKeyMappingKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} user key mapping table key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableIAMPermissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  UserKeyMappingKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-user-key-mapping"
      TargetKeyId: !Ref UserKeyMappingKmsKey

  UserKeyMappingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt UserKeyMappingKmsKey.Arn
      Tags:
        - Key: project
          Value: codex-bedrock
        - Key: component
          Value: jwt-middleware
        - Key: managed-by
          Value: cloudformation

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref UserKeyMappingTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt UserKeyMappingTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"
