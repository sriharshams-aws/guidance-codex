model_list:
  # OpenAI GPT-5.x models via LiteLLM's Bedrock Mantle provider.
  # The bundled entrypoint refreshes AWS_BEARER_TOKEN_BEDROCK in-process from
  # the AWS credential chain using aws-bedrock-token-generator, so do not pin
  # api_key here. LiteLLM reads the bearer token from env on each request.
  # GPT-5.x traffic to Mantle uses /openai/v1/responses.

  - model_name: gpt-5.4
    litellm_params:
      model: bedrock_mantle/openai.gpt-5.4

  - model_name: gpt-5.5
    litellm_params:
      model: bedrock_mantle/openai.gpt-5.5

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

  # JWT/OIDC authentication (LiteLLM Enterprise only)
  # Uncomment to enable when running LiteLLM Enterprise.
  # For local testing, use LITELLM_MASTER_KEY as the Bearer token instead.
  # Set JWT_PUBLIC_KEY_URL env var to your IdP's JWKS endpoint.
  #
  # enable_jwt_auth: true
  # litellm_jwtauth:
  #   user_id_jwt_field: "sub"
  #   user_email_jwt_field: "email"
  #   team_ids_jwt_field: "groups"  # array claim — maps IdP groups to LiteLLM teams
  #   public_key_ttl: 600           # cache JWKS for 10 minutes

litellm_settings:
  set_verbose: false
  drop_params: false   # fail fast if the gateway cannot preserve a Responses API field
  # callbacks: ["otel"]  # uncomment + set OTEL_ENDPOINT env var if you wire up an OTel collector
